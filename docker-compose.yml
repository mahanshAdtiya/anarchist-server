services:
  anarchist-db:
    container_name: anarchist-db
    image: postgres:latest
    restart: always
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: anarchist
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-U", "postgres", "-d","anarchist"]
      interval: 3s
      timeout: 3s
      retries: 5
    volumes:
      - anarchist_db_data:/var/lib/postgresql/data

volumes:
  anarchist_db_data:
